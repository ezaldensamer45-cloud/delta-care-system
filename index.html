<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care PRO</title>

<style>
body{
font-family:Arial;
background:#0f172a url("WhatsApp%20Image%202026-04-12%20at%205.54.37%20PM.jpeg") center/cover no-repeat;
color:white;
margin:0;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
margin:3px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px;
border-radius:8px;
}

img{
margin:5px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="overlay">

<h2>Delta Care PRO</h2>

<h3>Add Patient ➕</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<input id="diseaseType" placeholder="نوع المرض">
<input id="diseasePlace" placeholder="مكان المرض">

<input id="notes" placeholder="Notes">

<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials">
<input id="mprice" placeholder="Materials Price">

<input type="date" id="date">

<input type="file" id="images" multiple>

<button onclick="addPatient()">➕ Add</button>

<hr>

<input id="search" placeholder="Search..." oninput="display()">

<div id="list"></div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

function addPatient(){

let p = {
name:name.value,
age:age.value,
doctor:doctor.value,

diseaseType:diseaseType.value,
diseasePlace:diseasePlace.value,

notes:notes.value,

price:+price.value||0,
materials:materials.value,
mprice:+mprice.value||0,

lastDate:date.value,

images:[],
sessions:[]
};

let files = images.files;

if(files.length>0){
for(let i=0;i<files.length && i<10;i++){
let r=new FileReader();
r.onload=e=>{
p.images.push(e.target.result);
if(p.images.length===Math.min(files.length,10)){
savePatient(p);
}
}
r.readAsDataURL(files[i]);
}
}else{
savePatient(p);
}

}

function savePatient(p){
patients.push(p);
localStorage.setItem("patients", JSON.stringify(patients));
display();
}

function display(){

list.innerHTML="";

patients
.filter(p=>p.name.toLowerCase().includes(search.value.toLowerCase()))
.forEach((p,i)=>{

list.innerHTML+=`
<div class="card">

<h3 onclick="toggle(${i})">${p.name}</h3>

<div id="d${i}" style="display:none;">

<p>Age: ${p.age}</p>
<p>Doctor: ${p.doctor}</p>

<p>نوع المرض: ${p.diseaseType}</p>
<p>مكان المرض: ${p.diseasePlace}</p>

<p>Notes: ${p.notes}</p>

<p>آخر جلسة: ${p.lastDate || "-"}</p>

<p>Session: ${p.price}</p>
<p>Materials: ${p.materials}</p>
<p>Materials Cost: ${p.mprice}</p>

<div>
${p.images.map(img=>`<img src="${img}" width="80">`).join("")}
</div>

<hr>

<h4>Sessions</h4>
${p.sessions.map(s=>`
<div>
📅 ${s.date} - 💰 ${s.price}
</div>
`).join("")}

<input type="date" id="sd${i}">
<input placeholder="price" id="sp${i}">

<button onclick="addSession(${i})">➕ Add Session</button>

<br>

<input type="file" id="si${i}" multiple>
<button onclick="addImages(${i})">➕ Add Images</button>

<br>

<button onclick="del(${i})">Delete</button>

</div>
</div>
`;
});
}

function toggle(i){
let d=document.getElementById("d"+i);
d.style.display=d.style.display==="none"?"block":"block";
}

function del(i){
patients.splice(i,1);
localStorage.setItem("patients", JSON.stringify(patients));
display();
}

function addSession(i){
let d=document.getElementById("sd"+i).value;
let p=document.getElementById("sp"+i).value;

patients[i].sessions.push({date:d,price:p});
patients[i].lastDate=d;

localStorage.setItem("patients", JSON.stringify(patients));
display();
}

function addImages(i){

let files=document.getElementById("si"+i).files;

for(let j=0;j<files.length && j<10;j++){
let r=new FileReader();
r.onload=e=>{
patients[i].images.push(e.target.result);
localStorage.setItem("patients", JSON.stringify(patients));
display();
}
r.readAsDataURL(files[j]);
}

}

</script>

</body>
</html>
