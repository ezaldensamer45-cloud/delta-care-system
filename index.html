<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
}

input{
padding:8px;
margin:5px;
width:180px;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:10px;
}
</style>

</head>

<body>

<div class="overlay">

<h2>Delta Care System</h2>

<h3>Add Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<input id="disease" placeholder="Disease Type">
<input id="place" placeholder="Disease Location">

<input id="date" type="date">

<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials">
<input id="notes" placeholder="Notes">

<br>

<input type="file" id="images" multiple>

<br>

<button id="addBtn">Add</button>

<hr>

<h3>Search</h3>
<input id="search" placeholder="Search..." oninput="display()">

<div id="list"></div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

document.getElementById("addBtn").onclick = addPatient;

function addPatient(){

let name = document.getElementById("name").value;

if(name === ""){
alert("اكتب الاسم");
return;
}

let age = document.getElementById("age").value;
let doctor = document.getElementById("doctor").value;
let disease = document.getElementById("disease").value;
let place = document.getElementById("place").value;
let date = document.getElementById("date").value;
let price = document.getElementById("price").value;
let materials = document.getElementById("materials").value;
let notes = document.getElementById("notes").value;

let files = document.getElementById("images").files;
let images = [];

if(files.length === 0){
savePatient(images,name,age,doctor,disease,place,date,price,materials,notes);
return;
}

for(let i=0;i<files.length;i++){

let reader = new FileReader();

reader.onload = function(e){

images.push(e.target.result);

if(images.length === files.length){
savePatient(images,name,age,doctor,disease,place,date,price,materials,notes);
}
};

reader.readAsDataURL(files[i]);
}

}

function savePatient(images,name,age,doctor,disease,place,date,price,materials,notes){

let patient = {
name,
age,
doctor,
disease,
place,
date,
price,
materials,
notes,
images
};

patients.push(patient);
localStorage.setItem("patients", JSON.stringify(patients));

display();

alert("تم الحفظ ✅");
}

function display(){

let s = document.getElementById("search").value.toLowerCase();
let list = document.getElementById("list");

list.innerHTML = "";

patients
.filter(p => p.name.toLowerCase().includes(s))
.forEach((p,i)=>{

list.innerHTML += `
<div class="card">

<h3>${p.name}</h3>

<p>Age: ${p.age}</p>
<p>Doctor: ${p.doctor}</p>
<p>Disease: ${p.disease}</p>
<p>Location: ${p.place}</p>
<p>Date: ${p.date}</p>
<p>Session: ${p.price}</p>
<p>Materials: ${p.materials}</p>
<p>Notes: ${p.notes}</p>

${p.images.map(img=>`<img src="${img}" width="100">`).join("")}

<br>
<button onclick="deletePatient(${i})">Delete</button>

</div>
`;
});
}

function deletePatient(i){
patients.splice(i,1);
localStorage.setItem("patients", JSON.stringify(patients));
display();
}

display();

</script>

</body>
</html>
