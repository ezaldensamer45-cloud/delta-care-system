<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title><style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}
</style></head>
<body><h2>Delta Care System</h2><h3>إضافة مريض</h3><input id="name" placeholder="اسم المريض">
<input id="age" placeholder="العمر">
<input id="doctor" placeholder="الطبيب">
<input id="disease" placeholder="نوع المرض">
<input id="place" placeholder="مكان المرض">
<input id="date" type="date">
<input id="price" placeholder="سعر الجلسة">
<input id="materials" placeholder="المواد المستخدمة">
<input id="notes" placeholder="ملاحظات"><br><button onclick="addPatient()">➕ إضافة مريض</button>

<hr><input id="search" oninput="loadPatients()" placeholder="بحث"><div id="list"></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
  authDomain: "delta-care-ff9e4.firebaseapp.com",
  projectId: "delta-care-ff9e4",
  storageBucket: "delta-care-ff9e4.firebasestorage.app",
  messagingSenderId: "941195755372",
  appId: "1:941195755372:web:02c1470c4362765c513d49"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ADD
window.addPatient = async function(){

let name = document.getElementById("name").value.trim();

if(name === ""){
alert("اكتب اسم المريض");
return;
}

let patient = {
name: name,
age: document.getElementById("age").value,
doctor: document.getElementById("doctor").value,
disease: document.getElementById("disease").value,
place: document.getElementById("place").value,
date: document.getElementById("date").value,
price: document.getElementById("price").value,
materials: document.getElementById("materials").value,
notes: document.getElementById("notes").value
};

await addDoc(collection(db, "patients"), patient);

alert("تم الحفظ ✅");

clearFields();
loadPatients();
}

// LOAD
async function loadPatients(){

let s = document.getElementById("search").value.toLowerCase();
let list = document.getElementById("list");
list.innerHTML = "";

let querySnapshot = await getDocs(collection(db, "patients"));

querySnapshot.forEach((doc) => {
let p = doc.data();

if(p.name.toLowerCase().includes(s)){

list.innerHTML += `
<div class="card">
<h3>${p.name}</h3>
<p>العمر: ${p.age}</p>
<p>الطبيب: ${p.doctor}</p>
<p>المرض: ${p.disease}</p>
<p>المكان: ${p.place}</p>
<p>التاريخ: ${p.date}</p>
<p>السعر: ${p.price}</p>
<p>المواد: ${p.materials}</p>
<p>ملاحظات: ${p.notes}</p>
</div>
`;

}

});

}

// CLEAR
function clearFields(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

// تشغيل أولي
loadPatients();

</script></body>
</html>
