<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Care System</title>

<style>
body{
font-family: Arial;
background: #0f172a url("WhatsApp%20Image%202026-04-12%20at%205.54.37%20PM.jpeg") center/cover no-repeat;
color:white;
padding:20px;
}

.overlay{
background: rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}

input, select{
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

img{
margin:5px;
border-radius:6px;
}
</style>
</head>

<body>

<div class="overlay">

<h2>Delta Care System</h2>

<h3>Add Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<select id="type">
<option>Complex wounds</option>
<option>Burn</option>
<option>Diabetic foot</option>
</select>

<select id="place">
<option>Hand</option>
<option>Foot</option>
<option>Back</option>
</select>

<input id="date" type="date">
<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials">
<input id="mprice" placeholder="Materials Price">

<br>

<input type="file" id="images" multiple accept="image/*">

<br>

<button onclick="addPatient()">Add</button>

<hr>

<h3>Search</h3>
<input id="search" placeholder="Search..." oninput="display()">

<div id="list"></div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

function addPatient(){

let files = document.getElementById("images").files;
let imgs = [];

if(files.length === 0){
savePatient([]);
return;
}

for(let i=0;i<files.length && i<10;i++){

let reader = new FileReader();

reader.onload = function(e){
imgs.push(e.target.result);

if(imgs.length === Math.min(files.length,10)){
savePatient(imgs);
}
}

reader.readAsDataURL(files[i]);
}
}

function savePatient(imgs){

let p = {
name: document.getElementById("name").value,
age: document.getElementById("age").value,
doctor: document.getElementById("doctor").value,
type: document.getElementById("type").value,
place: document.getElementById("place").value,
date: document.getElementById("date").value,
price: document.getElementById("price").value,
materials: document.getElementById("materials").value,
mprice: document.getElementById("mprice").value,
images: imgs
};

patients.push(p);
localStorage.setItem("patients", JSON.stringify(patients));

display();
}

function deletePatient(i){
patients.splice(i,1);
localStorage.setItem("patients", JSON.stringify(patients));
display();
}

function toggle(i){
let d = document.getElementById("details-"+i);
d.style.display = d.style.display === "none" ? "block" : "none";
}

function display(){

let s = document.getElementById("search").value.toLowerCase();
let list = document.getElementById("list");

list.innerHTML = "";

patients
.filter(p => p.name.toLowerCase().includes(s))
.forEach((p,i)=>{

list.innerHTML += `
<div class="card">

<h3 onclick="toggle(${i})" style="cursor:pointer;">
${p.name}
</h3>

<div id="details-${i}" style="display:none;">

<p>Age: ${p.age}</p>
<p>Doctor: ${p.doctor}</p>
<p>Type: ${p.type}</p>
<p>Place: ${p.place}</p>
<p>Date: ${p.date || "—"}</p>
<p>Session: ${p.price} IQD</p>
<p>Materials: ${p.materials}</p>
<p>Materials Cost: ${p.mprice} IQD</p>

<div>
${(p.images || []).map(img => `<img src="${img}" width="120">`).join("")}
</div>

<button onclick="deletePatient(${i})">Delete</button>

</div>

</div>
`;

});
}

display();

</script>

</body>
</html>
