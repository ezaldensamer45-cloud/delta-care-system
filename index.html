<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care Pro</title>

<style>
body{
font-family:Arial;
background: url("file_00000000facc7246b6da64fac183c4f1.jpg") no-repeat center center fixed;
background-size: cover;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:black;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.details{
display:none;
margin-top:10px;
}

img{
width:70px;
margin:3px;
border-radius:5px;
cursor:pointer;
}

h3{
font-size:22px;
}

.title span{
font-size:20px;
font-weight:bold;
}
</style>

</head>
<body>

<h2>Delta Care Pro</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">دخول</button>
</div>

<button onclick="changeUser()">⚙ تغيير اليوزر والباس</button>

<hr>

<div id="app" style="display:none">

<input id="search" oninput="loadPatients()" placeholder="بحث">

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم المريض">
<input id="age" placeholder="العمر">
<input id="doctor" placeholder="الطبيب">
<input id="disease" placeholder="نوع المرض">
<input id="place" placeholder="مكان المرض">
<input id="date" type="date">
<input id="price" placeholder="السعر">
<input id="materials" placeholder="المواد">
<input id="notes" placeholder="ملاحظات">

<br>
<input type="file" id="images" multiple>
<br>

<button onclick="addPatient()">➕ إضافة</button>

<hr>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
  authDomain: "delta-care-ff9e4.firebaseapp.com",
  projectId: "delta-care-ff9e4",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 LOGIN
if(!localStorage.getItem("user")){
localStorage.setItem("user","admin");
localStorage.setItem("pass","1234");
}

window.login = function(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === localStorage.getItem("user") && p === localStorage.getItem("pass")){

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

loadPatients();

}else{
alert("خطأ");
}
}

window.changeUser = function(){
let u = prompt("يوزر جديد");
let p = prompt("باس جديد");
if(u && p){
localStorage.setItem("user",u);
localStorage.setItem("pass",p);
alert("تم التغيير");
}
}

// ➕ ADD
window.addPatient = function(){

let name = document.getElementById("name").value;

if(!name){
alert("اكتب اسم المريض");
return;
}

let files = document.getElementById("images").files;
let imgs = [];

if(files.length > 0){

let count = 0;

for(let f of files){

let reader = new FileReader();

reader.onload = function(e){
imgs.push(e.target.result);
count++;

if(count === files.length){
save(imgs);
}
};

reader.readAsDataURL(f);
}

}else{
save([]);
}

async function save(imgs){

await addDoc(collection(db,"patients"),{
name: name,
age: age.value,
doctor: doctor.value,
disease: disease.value,
place: place.value,
date: date.value,
price: price.value,
materials: materials.value,
notes: notes.value,
images: imgs,
sessions:[]
});

alert("تمت الإضافة ✅");
loadPatients();
}

}

// 📥 LOAD
async function loadPatients(){

let s = search.value.toLowerCase();
list.innerHTML="";

let data = await getDocs(collection(db,"patients"));

data.forEach(d=>{
let p=d.data();
let id=d.id;

if(!p.name.toLowerCase().includes(s)) return;

list.innerHTML += `
<div class="card">

<div class="title" onclick="toggle('${id}')">
<span>${p.name}</span>
<span class="arrow" id="a${id}">⬇</span>
</div>

<div class="details" id="${id}">

<p>العمر: ${p.age}</p>
<p>الطبيب: ${p.doctor}</p>
<p>المرض: ${p.disease}</p>

${(p.images||[]).map(i=>`<img src="${i}" onclick="openImage('${i}')">`).join("")}

<br>

<button onclick="deletePatient('${id}')">🗑 حذف</button>
<button onclick="editPatient('${id}')">✏ تعديل</button>
<button onclick="addSession('${id}')">➕ جلسة</button>
<button onclick="printPatient('${id}')">🖨 طباعة</button>

<div>
${(p.sessions||[]).map(s=>`<div>📅 ${s.date} - 💰 ${s.price}</div>`).join("")}
</div>

</div>

</div>
`;
});
}

// 🔄 TOGGLE + سهم
window.toggle = function(id){
let el=document.getElementById(id);
let arrow=document.getElementById("a"+id);

if(el.style.display==="block"){
el.style.display="none";
arrow.innerText="⬇";
}else{
el.style.display="block";
arrow.innerText="⬆";
}
}

// 🗑 DELETE
window.deletePatient = async function(id){
await deleteDoc(doc(db,"patients",id));
loadPatients();
}

// ✏ EDIT
window.editPatient = async function(id){
let name = prompt("اسم جديد");
let age = prompt("عمر جديد");

await updateDoc(doc(db,"patients",id),{name,age});
loadPatients();
}

// ➕ SESSION
window.addSession = async function(id){

let date = prompt("تاريخ");
let price = prompt("سعر");

let data = await getDocs(collection(db,"patients"));
let p;

data.forEach(d=>{
if(d.id===id) p=d.data();
});

let sessions = p.sessions || [];
sessions.push({date,price});

await updateDoc(doc(db,"patients",id),{sessions});
loadPatients();
}

// 🖨 PRINT
window.printPatient = function(id){
let content = document.getElementById(id).innerHTML;
let w = window.open("");
w.document.write(content);
w.print();
}

// 🔍 IMAGE
window.openImage = function(src){
let w = window.open("");
w.document.write(`<img src="${src}" style="width:100%">`);
}

</script>

</body>
</html>
