<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care Pro</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:black;
color:white;
cursor:pointer;
font-weight:bold;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.details{display:none}

img{
width:70px;
margin:3px;
border-radius:5px;
cursor:pointer;
}

.title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-size:18px;
}
</style>
</head>

<body>

<h2>Delta Care</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">دخول</button>
</div>

<hr>

<div id="app" style="display:none">

<input id="search" oninput="loadPatients()" placeholder="بحث">

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم">
<input id="age" placeholder="عمر">
<input id="doctor" placeholder="طبيب">
<input id="disease" placeholder="مرض">
<input id="place" placeholder="مكان">
<input id="date" type="date">
<input id="price" placeholder="سعر">
<input id="materials" placeholder="مواد">
<input id="notes" placeholder="ملاحظات">

<br>
<input type="file" id="images" multiple>
<br>

<button onclick="addPatient()">➕ إضافة</button>

<hr>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
authDomain:"delta-care-ff9e4.firebaseapp.com",
projectId:"delta-care-ff9e4"
});

const db = getFirestore(app);

// 👇 تسجيل دخول افتراضي
if(!localStorage.getItem("user")){
localStorage.setItem("user","admin");
localStorage.setItem("pass","1234");
}

// حفظ الدخول
if(localStorage.getItem("logged")==="yes"){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
loadPatients();
}

window.login = function(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === localStorage.getItem("user") && p === localStorage.getItem("pass")){
localStorage.setItem("logged","yes");
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
loadPatients();
}else{
alert("خطأ");
}
}

// تحويل صورة
function toBase64(file){
return new Promise((resolve)=>{
let reader = new FileReader();
reader.onload = ()=> resolve(reader.result);
reader.readAsDataURL(file);
});
}

// ➕ إضافة
window.addPatient = async function(){

let name = document.getElementById("name").value;
if(!name){alert("اكتب الاسم");return;}

let imgs = [];
let files = document.getElementById("images").files;

for(let f of files){
let b = await toBase64(f);
imgs.push(b);
}

await addDoc(collection(db,"patients"),{
name,
age: age.value,
doctor: doctor.value,
disease: disease.value,
place: place.value,
date: date.value,
price: price.value,
materials: materials.value,
notes: notes.value,
images: imgs,
sessions:[]
});

loadPatients();
}

// 📥 عرض
async function loadPatients(){

list.innerHTML="";
let s = search.value.toLowerCase();

let data = await getDocs(collection(db,"patients"));

data.forEach(d=>{

let p = d.data();
let id = d.id;

if(!p.name.toLowerCase().includes(s)) return;

list.innerHTML += `
<div class="card">

<div class="title" onclick="toggle('${id}')">
<span>${p.name}</span>
<span id="a${id}">⬇</span>
</div>

<div class="details" id="${id}">

<p>العمر: ${p.age}</p>
<p>الطبيب: ${p.doctor}</p>

${(p.images||[]).map(img=>`
<img src="${img}" onclick="openImage('${img}')">
`).join("")}

<br>

<button onclick="deletePatient('${id}')">🗑 حذف</button>
<button onclick="editPatient('${id}')">✏ تعديل</button>
<button onclick="addSession('${id}')">➕ جلسة</button>

<div>
${(p.sessions||[]).map(s=>`
<div>📅 ${s.date} - 💰 ${s.price}</div>
`).join("")}
</div>

</div>
</div>
`;
});
}

// 🔽 فتح/غلق
window.toggle = function(id){
let el=document.getElementById(id);
let a=document.getElementById("a"+id);

if(el.style.display==="block"){
el.style.display="none";
a.innerText="⬇";
}else{
el.style.display="block";
a.innerText="⬆";
}
}

// 🗑 حذف
window.deletePatient = async function(id){
await deleteDoc(doc(db,"patients",id));
loadPatients();
}

// ✏ تعديل
window.editPatient = async function(id){
let name = prompt("اسم جديد");
await updateDoc(doc(db,"patients",id),{name});
loadPatients();
}

// ➕ جلسة
window.addSession = async function(id){

let date = prompt("تاريخ");
let price = prompt("سعر");

if(!date) return;

let snapshot = await getDocs(collection(db,"patients"));
let p;

snapshot.forEach(d=>{
if(d.id === id) p = d.data();
});

let sessions = p.sessions || [];
sessions.push({date,price});

await updateDoc(doc(db,"patients",id),{sessions});
loadPatients();
}

// 🔍 صورة
window.openImage = function(src){
let w = window.open("");
w.document.write(`<img src="${src}" style="width:100%">`);
}

</script>

</body>
</html>
