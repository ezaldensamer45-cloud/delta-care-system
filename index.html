<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
.light { background:#f1f5f9; color:black; }

input, select { padding:8px; margin:5px; }
button { padding:8px 10px; margin:3px; cursor:pointer; }

.card {
  background:#1e293b;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

.light .card { background:white; }
img { border-radius:8px; margin-top:5px; }
</style>
</head>

<body>

<h2>Delta Care System</h2>
<button onclick="toggleMode()">🌙 / ☀️</button>

<h3>Add / Edit Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<select id="type">
  <option>Complex wounds</option>
  <option>Simple wounds</option>
</select>

<select id="location">
  <option>يد</option>
  <option>قدم</option>
  <option>ظهر</option>
  <option>بطن</option>
</select>

<input type="date" id="date">

<select id="status">
  <option>مستمر</option>
  <option>مكتمل</option>
  <option>متوقف</option>
</select>

<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials">
<input id="mprice" placeholder="Materials Price">

<input id="notes" placeholder="Notes">
<input type="file" id="image">

<button onclick="addOrUpdate()">Save</button>

<hr>

<h3>Search</h3>
<input id="search" placeholder="Search..." oninput="display()">

<div id="list"></div>

<script>
let patients = [];
let editId = null;

// تحميل
async function loadPatients(){
  let res = await fetch("https://delta-care-api.onrender.com/patients");
  patients = await res.json();
  display();
}

// إضافة أو تعديل
async function addOrUpdate(){

  let file = document.getElementById("image").files[0];
  let imageBase64 = "";

  if(file){
    let reader = new FileReader();
    await new Promise(resolve=>{
      reader.onload = ()=>{ imageBase64 = reader.result; resolve(); };
      reader.readAsDataURL(file);
    });
  }

  let p = {
    name: name.value,
    age: age.value,
    doctor: doctor.value,
    type: type.value,
    location: location.value,
    date: date.value,
    status: status.value,
    price: price.value,
    materials: materials.value,
    mprice: mprice.value,
    notes: notes.value,
    image: imageBase64
  };

  if(editId){
    await fetch("https://delta-care-api.onrender.com/patients/"+editId,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(p)
    });
    editId = null;
  } else {
    await fetch("https://delta-care-api.onrender.com/patients",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(p)
    });
  }

  clearFields();
  loadPatients();
}

// حذف
async function deletePatient(id){
  await fetch("https://delta-care-api.onrender.com/patients/"+id,{method:"DELETE"});
  loadPatients();
}

// تعبئة للتعديل
function editPatient(p){
  name.value = p.name;
  age.value = p.age;
  doctor.value = p.doctor;
  type.value = p.type;
  location.value = p.location;
  date.value = p.date;
  status.value = p.status;
  price.value = p.price;
  materials.value = p.materials;
  mprice.value = p.mprice;
  notes.value = p.notes;

  editId = p._id;
}

// عرض
function display(){
  let s = search.value.toLowerCase();
  list.innerHTML="";

  patients
  .filter(p=>p.name.toLowerCase().includes(s))
  .forEach(p=>{
    list.innerHTML+=`
      <div class="card">
        <h3>${p.name}</h3>

        ${p.image ? `<img src="${p.image}" width="120">` : ""}

        <p>Age: ${p.age}</p>
        <p>Doctor: ${p.doctor}</p>
        <p>Type: ${p.type}</p>
        <p>Location: ${p.location}</p>
        <p>Date: ${p.date}</p>
        <p>Status: ${p.status}</p>

        <p>Session: ${p.price} IQD</p>
        <p>Materials: ${p.materials}</p>
        <p>Materials Cost: ${p.mprice} IQD</p>

        <p>Notes: ${p.notes}</p>

        <button onclick='editPatient(${JSON.stringify(p)})'>Edit</button>
        <button onclick="deletePatient('${p._id}')">Delete</button>
      </div>
    `;
  });
}

// تنظيف
function clearFields(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

// دارك مود
function toggleMode(){
  document.body.classList.toggle("light");
}

// تشغيل
loadPatients();
</script>

</body>
</html>
