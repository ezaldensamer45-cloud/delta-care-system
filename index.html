<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care PRO</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;}
.overlay{padding:20px;}
input,select{padding:8px;margin:5px;}
button{padding:8px 12px;margin:3px;}
.card{background:#1e293b;padding:10px;margin:10px;border-radius:8px;}
img{margin:5px;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" style="text-align:center;">
<h2>Login</h2>
<input id="user" placeholder="User"><br>
<input id="pass" type="password" placeholder="Pass"><br>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="overlay" style="display:none;">

<h2>Delta Care PRO</h2>

<button onclick="logout()">Logout</button>
<button onclick="openSettings()" id="settingsBtn">⚙️</button>

<h3>Add / Edit Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<input id="diseaseType" placeholder="نوع المرض">
<input id="diseasePlace" placeholder="مكان المرض">

<input id="notes" placeholder="Notes">

<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials Price">

<input type="date" id="date">

<input type="file" id="images" multiple>

<button onclick="savePatient()">Save</button>

<hr>

<input id="search" placeholder="Search..." oninput="display()">

<h3 id="profit"></h3>

<div id="list"></div>

</div>

<!-- SETTINGS -->
<div id="settings" style="display:none;background:black;position:fixed;top:0;width:100%;height:100%;padding:20px;">
<h2>Users</h2>

<input id="uName" placeholder="User">
<input id="uPass" placeholder="Pass">
<button onclick="addUser()">Add</button>

<div id="usersList"></div>

<button onclick="closeSettings()">Close</button>
</div>

<script>

let patients=JSON.parse(localStorage.getItem("patients"))||[];
let users=JSON.parse(localStorage.getItem("users"))||[{user:"admin",pass:"1234",role:"admin"}];

let editIndex=null;
let currentUser=null;

function login(){
let f=users.find(x=>x.user===user.value&&x.pass===pass.value);
if(f){
currentUser=f;
loginBox.style.display="none";
app.style.display="block";

if(f.role!=="admin") settingsBtn.style.display="none";

display();
}else alert("Wrong");
}

function logout(){ location.reload(); }

function savePatient(){

let files=images.files;
let imgs=[];

if(files.length===0){
finish([]);
return;
}

for(let i=0;i<files.length&&i<10;i++){
let r=new FileReader();
r.onload=e=>{
imgs.push(e.target.result);
if(imgs.length===Math.min(files.length,10)) finish(imgs);
};
r.readAsDataURL(files[i]);
}
}

function finish(imgs){

let p={
name:name.value,
age:age.value,
doctor:doctor.value,

diseaseType:diseaseType.value,
diseasePlace:diseasePlace.value,
notes:notes.value,

price:+price.value||0,
materials:+materials.value||0,
date:date.value,
images:imgs
};

if(editIndex!==null){
patients[editIndex]=p;
editIndex=null;
}else{
patients.push(p);
}

localStorage.setItem("patients",JSON.stringify(patients));
display();
clear();
}

function clear(){
name.value="";
age.value="";
doctor.value="";
diseaseType.value="";
diseasePlace.value="";
notes.value="";
price.value="";
materials.value="";
images.value="";
}

function edit(i){
let p=patients[i];

name.value=p.name;
age.value=p.age;
doctor.value=p.doctor;

diseaseType.value=p.diseaseType;
diseasePlace.value=p.diseasePlace;
notes.value=p.notes;

price.value=p.price;
materials.value=p.materials;
date.value=p.date;

editIndex=i;
}

function del(i){
if(confirm("Delete?")){
patients.splice(i,1);
localStorage.setItem("patients",JSON.stringify(patients));
display();
}
}

function display(){

list.innerHTML="";
let total=0;

patients
.filter(p=>p.name.toLowerCase().includes(search.value.toLowerCase()))
.forEach((p,i)=>{

total+=p.price+p.materials;

list.innerHTML+=`
<div class="card">

<h3 onclick="toggle(${i})">${p.name}</h3>

<div id="d${i}" style="display:none;">

<p>Age: ${p.age}</p>
<p>Doctor: ${p.doctor}</p>

<p>نوع المرض: ${p.diseaseType}</p>
<p>مكان المرض: ${p.diseasePlace}</p>

<p>Notes: ${p.notes}</p>

<p>Date: ${p.date||"-"}</p>

<p>Session: ${p.price}</p>
<p>Materials: ${p.materials}</p>

<div>
${(p.images||[]).map(img=>`<img src="${img}" width="100" onclick="openImg('${img}')">`).join("")}
</div>

<button onclick="edit(${i})">Edit</button>
<button onclick="del(${i})">Delete</button>

</div>
</div>
`;
});

profit.innerText="Total: "+total+" IQD";
}

function toggle(i){
let d=document.getElementById("d"+i);
d.style.display=d.style.display==="none"?"block":"none";
}

function openImg(src){
let w=window.open();
w.document.write(`<img src="${src}" style="width:100%">`);
}

// USERS
function openSettings(){ settings.style.display="block"; loadUsers(); }
function closeSettings(){ settings.style.display="none"; }

function addUser(){
users.push({user:uName.value,pass:uPass.value,role:"staff"});
localStorage.setItem("users",JSON.stringify(users));
loadUsers();
}

function loadUsers(){
usersList.innerHTML="";
users.forEach((u,i)=>{
usersList.innerHTML+=`${u.user} <button onclick="delUser(${i})">X</button><br>`;
});
}

function delUser(i){
if(i===0)return;
users.splice(i,1);
localStorage.setItem("users",JSON.stringify(users));
loadUsers();
}

</script>

</body>
</html>
