<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body{
font-family:Arial;
background:#0f172a url("logo.png") center/cover no-repeat;
color:white;
margin:0;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
}

input{
padding:8px;
margin:5px;
width:180px;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" style="text-align:center;">
<h2>Login</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="overlay" style="display:none;">

<h2>Delta Care System</h2>

<h3>Add Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<input id="disease" placeholder="Disease Type">
<input id="place" placeholder="Disease Location">
<input id="notes" placeholder="Notes">

<input id="date" type="date">
<input id="price" placeholder="Session Price">

<br>

<input type="file" id="image">

<br>

<button onclick="addPatient()">Add</button>

<hr>

<h3>Patients</h3>
<div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDUyPh2DVnkrDSFF_1YWptAplKJE8jdckc",
  authDomain: "delta-care-3cadc.firebaseapp.com",
  projectId: "delta-care-3cadc",
  storageBucket: "delta-care-3cadc.firebasestorage.app",
  messagingSenderId: "994601391598",
  appId: "1:994601391598:web:98fbca752208b8c2842aff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN
function login(){
if(user.value === "admin" && pass.value === "1234"){
loginBox.style.display="none";
app.style.display="block";
display();
}else{
alert("Wrong login");
}
}

// ADD
function addPatient(){

let file = document.getElementById("image").files[0];

let p = {
name: name.value,
age: age.value,
doctor: doctor.value,
disease: disease.value,
place: place.value,
notes: notes.value,
date: date.value,
price: price.value
};

if(file){

let storageRef = firebase.storage().ref("images/" + file.name);

storageRef.put(file).then(snapshot=>{
return snapshot.ref.getDownloadURL();
}).then(url=>{

p.image = url;

db.collection("patients").add(p).then(()=>{
display();
});

});

}else{
db.collection("patients").add(p).then(()=>{
display();
});
}

}

// DISPLAY
function display(){
list.innerHTML="";

db.collection("patients").get().then(data=>{
data.forEach(doc=>{
let p = doc.data();

list.innerHTML += `
<div class="card">
<p>${p.name}</p>
<p>${p.disease}</p>
${p.image ? `<img src="${p.image}" width="100">` : ""}
</div>
`;
});
});
}

</script>

</body>
</html>
