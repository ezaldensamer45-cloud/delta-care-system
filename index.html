<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

input, select{
  padding:8px;
  margin:5px;
}

button{
  padding:8px 15px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>Delta Care System</h2>

<h3>Add Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<select id="type">
  <option>نوع المرض</option>
  <option>سكري</option>
  <option>حروق</option>
  <option>جروح عميقة</option>
</select>

<select id="place">
  <option>مكان المرض</option>
  <option>يد</option>
  <option>قدم</option>
  <option>صدر</option>
</select>

<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials">
<input id="mprice" placeholder="Materials Price">

<!-- ✨ الجديد -->
<input id="notes" placeholder="Notes">

<br>
<button onclick="addPatient()">Add</button>

<hr>

<input id="search" placeholder="Search..." oninput="display()">

<div id="list"></div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

function save(){
  localStorage.setItem("patients", JSON.stringify(patients));
}

function addPatient(){
  let p = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    doctor: document.getElementById("doctor").value,
    type: document.getElementById("type").value,
    place: document.getElementById("place").value,
    price: document.getElementById("price").value,
    materials: document.getElementById("materials").value,
    mprice: document.getElementById("mprice").value,
    notes: document.getElementById("notes").value
  };

  patients.push(p);
  save();
  display();
}

function deletePatient(i){
  patients.splice(i,1);
  save();
  display();
}

function display(){
  let s = document.getElementById("search").value.toLowerCase();
  let list = document.getElementById("list");
  list.innerHTML = "";

  patients
  .filter(p => p.name.toLowerCase().includes(s))
  .forEach((p,i)=>{

    list.innerHTML += `
    <div class="card">
      <h3>${p.name}</h3>
      <p>Age: ${p.age}</p>
      <p>Doctor: ${p.doctor}</p>
      <p>نوع المرض: ${p.type}</p>
      <p>مكان المرض: ${p.place}</p>
      <p>Session: ${p.price} IQD</p>
      <p>Materials: ${p.materials}</p>
      <p>Materials Cost: ${p.mprice} IQD</p>
      <p>Notes: ${p.notes || ""}</p>
      <button onclick="deletePatient(${i})">Delete</button>
    </div>
    `;
  });
}

display();

</script>

</body>
</html>
