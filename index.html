<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}
input,button{
padding:10px;
margin:5px;
}
.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}
</style>

</head>
<body>

<h2>Delta Care</h2>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<button onclick="addPatient()">Add</button>

<div id="list"></div>

<script>

let patients = [];

function addPatient(){

let name = document.getElementById("name").value;
let age = document.getElementById("age").value;

if(name === ""){
alert("اكتب الاسم");
return;
}

patients.push({name, age});
display();

}

function display(){

let list = document.getElementById("list");
list.innerHTML = "";

patients.forEach(p=>{
list.innerHTML += `<div class="card">${p.name} - ${p.age}</div>`;
});

}

</script>

</body>
</html>
