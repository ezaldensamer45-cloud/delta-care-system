<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care Hybrid</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
input,button{padding:10px;margin:5px;border-radius:6px;border:none}
button{background:#22c55e;color:white;cursor:pointer}
.card{background:#1e293b;padding:10px;margin:10px 0;border-radius:8px}
.details{display:none}
.title{display:flex;justify-content:space-between;cursor:pointer}
img{width:70px;margin:3px;border-radius:5px;cursor:pointer}
</style>
</head>

<body>

<h2>Delta Care Hybrid</h2>

<div id="loginBox">
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">

<input id="search" oninput="render()" placeholder="بحث">

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم">
<input id="age" placeholder="عمر">
<input id="doctor" placeholder="طبيب">

<input type="file" id="images" multiple>

<button onclick="addPatient()">➕ إضافة</button>

<hr>

<div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// 🔐 login ثابت
const USER="admin";
const PASS="1234";

function login(){
if(user.value===USER && pass.value===PASS){
localStorage.setItem("login","yes");
loginBox.style.display="none";
app.style.display="block";
startSync();
}else alert("خطأ");
}

if(localStorage.getItem("login")==="yes"){
loginBox.style.display="none";
app.style.display="block";
startSync();
}

// 🔥 Firebase
const firebaseConfig={
apiKey:"AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
authDomain:"delta-care-ff9e4.firebaseapp.com",
projectId:"delta-care-ff9e4"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// 📦 بيانات محلية
let patients = JSON.parse(localStorage.getItem("patients")) || [];

// 🔁 مزامنة
function startSync(){

// عرض المحلي فوراً (سريع)
render();

// جلب من فايربيس
db.collection("patients").get().then(snap=>{
snap.forEach(doc=>{
let data = doc.data();

// منع التكرار
if(!patients.find(p=>p.id===data.id)){
patients.push(data);
}
});

saveLocal();
render();
});

}

// 💾 حفظ محلي
function saveLocal(){
localStorage.setItem("patients",JSON.stringify(patients));
}

// 📸 تحويل صورة
function toBase64(file){
return new Promise(res=>{
let r=new FileReader();
r.onload=()=>res(r.result);
r.readAsDataURL(file);
});
}

// ➕ إضافة
async function addPatient(){

let name=document.getElementById("name").value;
if(!name) return alert("اكتب الاسم");

let imgs=[];

for(let f of images.files){
imgs.push(await toBase64(f));
}

let p={
id:Date.now(),
name,
age:age.value,
doctor:doctor.value,
images:imgs
};

// حفظ محلي فوراً
patients.push(p);
saveLocal();
render();

// رفع للفايربيس بالخلفية
db.collection("patients").add(p);

clear();
}

// 🧹 تنظيف
function clear(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

// عرض
function render(){

list.innerHTML="";
let s=search.value.toLowerCase();

patients.forEach(p=>{

if(!p.name.toLowerCase().includes(s)) return;

list.innerHTML+=`
<div class="card">

<div class="title" onclick="toggle(${p.id})">
<span>${p.name}</span>
<span id="a${p.id}">⬇</span>
</div>

<div class="details" id="${p.id}">

<p>${p.age}</p>
<p>${p.doctor}</p>

${(p.images||[]).map(img=>`
<img src="${img}" onclick="openImage('${img}')">
`).join("")}

<button onclick="deletePatient(${p.id})">🗑 حذف</button>

</div>
</div>
`;
});
}

// toggle
function toggle(id){
let d=document.getElementById(id);
let a=document.getElementById("a"+id);
d.style.display=d.style.display==="block"?"none":"block";
a.innerText=d.style.display==="block"?"⬆":"⬇";
}

// حذف
function deletePatient(id){
patients = patients.filter(p=>p.id!==id);
saveLocal();
render();

// حذف من فايربيس
db.collection("patients").where("id","==",id).get().then(snap=>{
snap.forEach(doc=>{
doc.ref.delete();
});
});
}

// صورة
function openImage(src){
let w=window.open("");
w.document.write(`<img src="${src}" style="width:100%">`);
}

</script>

</body>
</html>
