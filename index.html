<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care Pro</title>

<style>
body{
font-family:Arial;
background: url("file_00000000facc7246b6da64fac183c4f1.jpg") no-repeat center center fixed;
background-size: cover;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:black;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.details{display:none}

img{
width:70px;
margin:3px;
border-radius:5px;
cursor:pointer;
}

.title{
display:flex;
justify-content:space-between;
cursor:pointer;
font-size:20px;
}
</style>
</head>

<body>

<h2>Delta Care Pro</h2>

<div id="loginBox">
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">

<input id="search" oninput="loadPatients()" placeholder="بحث">

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم">
<input id="age" placeholder="عمر">
<input id="doctor" placeholder="طبيب">
<input id="disease" placeholder="مرض">
<input id="place" placeholder="مكان">
<input id="date" type="date">
<input id="price" placeholder="سعر">
<input id="materials" placeholder="مواد">
<input id="notes" placeholder="ملاحظات">

<input type="file" id="images" multiple>

<button onclick="addPatient()">➕ إضافة</button>

<hr>
<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
authDomain:"delta-care-ff9e4.firebaseapp.com",
projectId:"delta-care-ff9e4"
});

const db = getFirestore(app);

if(!localStorage.getItem("user")){
localStorage.setItem("user","admin");
localStorage.setItem("pass","1234");
}

window.login = function(){
if(user.value===localStorage.getItem("user") && pass.value===localStorage.getItem("pass")){
loginBox.style.display="none";
app.style.display="block";
loadPatients();
}else{
alert("خطأ");
}
}

function toBase64(file){
return new Promise(resolve=>{
let r=new FileReader();
r.onload=()=>resolve(r.result);
r.readAsDataURL(file);
});
}

window.addPatient = async function(){

let name=nameInput.value || document.getElementById("name").value;
if(!name){alert("اكتب الاسم");return;}

let imgs=[];
for(let f of images.files){
let b=await toBase64(f);
imgs.push(b);
}

await addDoc(collection(db,"patients"),{
name,
age:age.value,
doctor:doctor.value,
disease:disease.value,
place:place.value,
date:date.value,
price:price.value,
materials:materials.value,
notes:notes.value,
images:imgs,
sessions:[]
});

loadPatients();
}

async function loadPatients(){

list.innerHTML="";
let s=search.value.toLowerCase();

let data=await getDocs(collection(db,"patients"));

data.forEach(d=>{

let p=d.data();
let id=d.id;

if(!p.name.toLowerCase().includes(s)) return;

list.innerHTML+=`
<div class="card">

<div class="title" onclick="toggle('${id}')">
<span>${p.name}</span>
<span id="a${id}">⬇</span>
</div>

<div class="details" id="${id}">

<p>${p.age}</p>
<p>${p.doctor}</p>

${(p.images||[]).map((img,i)=>`
<div>
<img src="${img}" onclick="openImage('${img}')">
<button onclick="deleteImage('${id}',${i})">❌</button>
</div>
`).join("")}

<button onclick="editPatient('${id}')">✏ تعديل</button>
<button onclick="deletePatient('${id}')">🗑 حذف</button>
<button onclick="addSession('${id}')">➕ جلسة</button>

<div>
${(p.sessions||[]).map(s=>`
<div>
📅 ${s.date} - 💰 ${s.price}
${(s.images||[]).map(i=>`<img src="${i}">`).join("")}
</div>
`).join("")}
</div>

</div>
</div>
`;
});
}

window.toggle=id=>{
let el=document.getElementById(id);
let a=document.getElementById("a"+id);
el.style.display=el.style.display==="block"?"none":"block";
a.innerText=el.style.display==="block"?"⬆":"⬇";
}

window.deletePatient=async id=>{
await deleteDoc(doc(db,"patients",id));
loadPatients();
}

window.deleteImage=async(id,i)=>{

let data=await getDocs(collection(db,"patients"));
let p;

data.forEach(d=>{if(d.id===id)p=d.data()});

p.images.splice(i,1);

await updateDoc(doc(db,"patients",id),{images:p.images});
loadPatients();
}

window.editPatient=async id=>{
let name=prompt("اسم جديد");
let age=prompt("عمر جديد");

await updateDoc(doc(db,"patients",id),{name,age});
loadPatients();
}

window.addSession=async id=>{

let date=prompt("تاريخ");
let price=prompt("سعر");

let input=document.createElement("input");
input.type="file";
input.multiple=true;

input.onchange=async ()=>{
let imgs=[];
for(let f of input.files){
let b=await toBase64(f);
imgs.push(b);
}

let data=await getDocs(collection(db,"patients"));
let p;

data.forEach(d=>{if(d.id===id)p=d.data()});

let sessions=p.sessions||[];
sessions.push({date,price,images:imgs});

await updateDoc(doc(db,"patients",id),{sessions});
loadPatients();
};

input.click();
}

window.openImage=src=>{
let w=window.open("");
w.document.write(`<img src="${src}" style="width:100%">`);
}

</script>

</body>
</html>
