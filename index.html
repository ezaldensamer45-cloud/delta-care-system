<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care Pro</title>

<style>
body{
font-family:Arial;
background: url("file_00000000facc7246b6da64fac183c4f1.jpg") no-repeat center center fixed;
background-size:cover;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:black;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.details{display:none;margin-top:10px}

img{
width:70px;
margin:3px;
border-radius:5px;
cursor:pointer;
}

.title{
display:flex;
justify-content:space-between;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Delta Care Pro</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">دخول</button>
</div>

<button onclick="changeUser()">⚙ تغيير البيانات</button>

<hr>

<div id="app" style="display:none">

<input id="search" oninput="loadPatients()" placeholder="بحث">

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم">
<input id="age" placeholder="عمر">
<input id="doctor" placeholder="طبيب">
<input id="disease" placeholder="مرض">
<input id="place" placeholder="مكان">
<input id="date" type="date">
<input id="price" placeholder="سعر">
<input id="materials" placeholder="مواد">
<input id="notes" placeholder="ملاحظات">

<br>
<input type="file" id="images" multiple>
<br>

<button onclick="addPatient()">➕ إضافة</button>

<hr>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"delta-care-ff9e4.firebaseapp.com",
projectId:"delta-care-ff9e4"
});

const db = getFirestore(app);

// 🔐 USERS
if(!localStorage.getItem("user")){
localStorage.setItem("user","admin");
localStorage.setItem("pass","1234");
localStorage.setItem("role","doctor");
}

// حفظ تسجيل الدخول
if(localStorage.getItem("logged")==="yes"){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
loadPatients();
}
window.login = function(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === localStorage.getItem("user") && p === localStorage.getItem("pass")){

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

localStorage.setItem("logged","yes");

loadPatients();

}else{
alert("خطأ");
}
}

window.changeUser = function(){
let u=prompt("user");
let p=prompt("pass");
let r=prompt("role (doctor / secretary)");

if(u&&p){
localStorage.setItem("user",u);
localStorage.setItem("pass",p);
localStorage.setItem("role",r||"doctor");
}
}

// ➕ ADD
window.addPatient = function(){

let name = document.getElementById("name").value;
let age = document.getElementById("age").value;
let doctor = document.getElementById("doctor").value;
let disease = document.getElementById("disease").value;
let place = document.getElementById("place").value;
let date = document.getElementById("date").value;
let price = document.getElementById("price").value;
let materials = document.getElementById("materials").value;
let notes = document.getElementById("notes").value;

if(!name){
alert("اكتب اسم المريض");
return;
}

let files = document.getElementById("images").files;
let imgs = [];

if(files.length > 0){
let count = 0;

for(let f of files){
let reader = new FileReader();

reader.onload = function(e){
imgs.push(e.target.result);
count++;

if(count === files.length){
save(imgs);
}
};

reader.readAsDataURL(f);
}
}else{
save([]);
}

async function save(imgs){

await addDoc(collection(db,"patients"),{
name,age,doctor,disease,place,date,price,materials,notes,
images: imgs,
sessions: []
});

alert("تمت الإضافة");
loadPatients();
}

}

// 📥 LOAD
async function loadPatients(){

list.innerHTML="";
let s=search.value.toLowerCase();

let data=await getDocs(collection(db,"patients"));

data.forEach(d=>{

let p=d.data();
let id=d.id;

if(!p.name.toLowerCase().includes(s)) return;

list.innerHTML+=`
<div class="card">

<div class="title" onclick="toggle('${id}')">
<span>${p.name}</span>
<span id="a${id}">⬇</span>
</div>

<div class="details" id="${id}">

<p>${p.age}</p>
<p>${p.doctor}</p>

${(p.images||[]).map((img,i)=>`
<div>
<img src="${img}" onclick="openImage('${img}')">
<button onclick="deleteImage('${id}',${i})">❌</button>
</div>
`).join("")}

<br>

<button onclick="editPatient('${id}')">✏ تعديل</button>
<button onclick="deletePatient('${id}')">🗑 حذف</button>
<button onclick="addSession('${id}')">➕ جلسة</button>

<div>
${(p.sessions||[]).map(s=>`
<div>
📅 ${s.date} - 💰 ${s.price}
${(s.images||[]).map(i=>`<img src="${i}">`).join("")}
</div>
`).join("")}
</div>

</div>
</div>
`;
});
}

// 🔄 TOGGLE
window.toggle=id=>{
let el=document.getElementById(id);
let a=document.getElementById("a"+id);

if(el.style.display==="block"){
el.style.display="none";
a.innerText="⬇";
}else{
el.style.display="block";
a.innerText="⬆";
}
}

// 🗑 DELETE PATIENT
window.deletePatient=async id=>{
await deleteDoc(doc(db,"patients",id));
loadPatients();
}

// ❌ DELETE IMAGE
window.deleteImage=async(id,index)=>{

let data=await getDocs(collection(db,"patients"));
let p;

data.forEach(d=>{if(d.id===id)p=d.data()});

p.images.splice(index,1);

await updateDoc(doc(db,"patients",id),{images:p.images});
loadPatients();
}

// ✏ EDIT FULL
window.editPatient=async id=>{

let name=prompt("اسم");
let age=prompt("عمر");
let doctor=prompt("طبيب");

await updateDoc(doc(db,"patients",id),{name,age,doctor});
loadPatients();
}

// ➕ SESSION + صور
window.addSession = async function(id){

let date = prompt("تاريخ الجلسة");
let price = prompt("السعر");

if(!date || !price) return;

let input = document.createElement("input");
input.type = "file";
input.multiple = true;

input.onchange = async () => {

let files = input.files;
let imgs = [];

if(files.length > 0){
let count = 0;

for(let f of files){
let reader = new FileReader();

reader.onload = function(e){
imgs.push(e.target.result);
count++;

if(count === files.length){
save(imgs);
}
};

reader.readAsDataURL(f);
}
}else{
save([]);
}

async function save(imgs){

let snapshot = await getDocs(collection(db,"patients"));
let patientData;

snapshot.forEach(docu=>{
if(docu.id === id){
patientData = docu.data();
}
});

let sessions = patientData.sessions || [];
sessions.push({date, price, images: imgs});

await updateDoc(doc(db,"patients",id),{sessions});
loadPatients();
}

};

input.click();
}
// 🔍 IMAGE
window.openImage=src=>{
let w=window.open("");
w.document.write(`<img src="${src}" style="width:100%">`);
}

</script>

</body>
</html>
