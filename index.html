<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.overlay{
padding:20px;
}

input{
padding:8px;
margin:5px;
width:180px;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:10px;
}

img{
border-radius:10px;
margin:5px;
}
</style>

</head>

<body>

<div class="overlay">

<!-- 🔐 LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<!-- 🏥 SYSTEM -->
<div id="system" style="display:none;">

<div style="display:flex;align-items:center;gap:10px;">
<img src="logo.jpg" width="70">
<h2>Delta Care System</h2>
</div>

<h3>Add Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<input id="disease" placeholder="Disease Type">
<input id="place" placeholder="Disease Location">
<input id="notes" placeholder="Notes">

<input id="date" type="date">
<input id="price" placeholder="Session Price">

<br>

<input type="file" id="images" multiple>

<br>

<button onclick="addPatient()">Add</button>

<hr>

<h3>Search</h3>
<input id="search" oninput="display()" placeholder="Search...">

<div id="list"></div>

</div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

// 🔐 LOGIN
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === "admin" && p === "1234"){
document.getElementById("loginBox").style.display = "none";
document.getElementById("system").style.display = "block";
display();
}else{
alert("Wrong login");
}
}

// ➕ ADD
function addPatient(){

let files = document.getElementById("images").files;

let images = [];

if(files.length > 0){
let loaded = 0;

for(let i=0;i<files.length;i++){
let reader = new FileReader();

reader.onload = function(e){
images.push(e.target.result);
loaded++;

if(loaded === files.length){
savePatient(images);
}
}

reader.readAsDataURL(files[i]);
}

}else{
savePatient([]);
}

}

// 💾 SAVE
function savePatient(images){

let p = {
name: name.value,
age: age.value,
doctor: doctor.value,
disease: disease.value,
place: place.value,
notes: notes.value,
date: date.value,
price: price.value,
images: images
};

patients.push(p);
localStorage.setItem("patients", JSON.stringify(patients));

display();
clearInputs();

}

// 🧹 CLEAR
function clearInputs(){
name.value="";
age.value="";
doctor.value="";
disease.value="";
place.value="";
notes.value="";
date.value="";
price.value="";
images.value="";
}

// 📋 DISPLAY
function display(){

let s = search.value.toLowerCase();
list.innerHTML = "";

patients.forEach((p,i)=>{

if(p.name.toLowerCase().includes(s)){

list.innerHTML += `
<div class="card">
<b>${p.name}</b><br>
Age: ${p.age}<br>
Doctor: ${p.doctor}<br>
Disease: ${p.disease}<br>
Location: ${p.place}<br>
Notes: ${p.notes}<br>
Date: ${p.date}<br>
Session: ${p.price}<br>

${p.images.map(img => `<img src="${img}" width="100">`).join("")}

<br>
<button onclick="deletePatient(${i})">Delete</button>
</div>
`;
}

});

}

// ❌ DELETE
function deletePatient(i){
patients.splice(i,1);
localStorage.setItem("patients", JSON.stringify(patients));
display();
}

</script>

</body>
</html>
