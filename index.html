<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Care System</title>

<style>
body {font-family: Arial; background:#0f172a; color:white; margin:0; padding:20px;}
.light {background:#f1f5f9; color:black;}
input, select {padding:8px; margin:5px;}
button {padding:8px 15px; cursor:pointer;}
.card {background:#1e293b; padding:10px; margin:10px 0; border-radius:8px;}
.light .card {background:white;}
</style>
</head>

<body>

<h2>Delta Care System</h2>
<button onclick="toggleMode()">🌙 / ☀️</button>

<h3>Add Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Referring Doctor">

<select id="type">
<option>Complex wounds</option>
<option>Rabea</option>
</select>

<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials">
<input id="mprice" placeholder="Materials Price">

<br>
<button onclick="addPatient()">Add</button>

<hr>

<h3>Search</h3>
<input id="search" onkeyup="display()" placeholder="Search...">

<div id="list"></div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

function save(){
localStorage.setItem("patients", JSON.stringify(patients));
}

function addPatient(){
let p = {
name: name.value,
age: age.value,
doctor: doctor.value,
type: type.value,
price: price.value,
materials: materials.value,
mprice: mprice.value
};

patients.push(p);
save();
display();
clearInputs();
}

function clearInputs(){
name.value="";
age.value="";
doctor.value="";
price.value="";
materials.value="";
mprice.value="";
}

function display(){
let s = search.value.toLowerCase();
list.innerHTML="";

patients.filter(p=>p.name.toLowerCase().includes(s)).forEach((p,i)=>{
list.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p>Age: ${p.age}</p>
<p>Doctor: ${p.doctor}</p>
<p>Type: ${p.type}</p>
<p>Session: ${p.price} IQD</p>
<p>Materials: ${p.materials}</p>
<p>Materials Cost: ${p.mprice} IQD</p>

<button onclick="deletePatient(${i})">Delete</button>
</div>`;
});
}

function deletePatient(i){
patients.splice(i,1);
save();
display();
}

function toggleMode(){
document.body.classList.toggle("light");
}

display();

</script>

</body>
</html>
