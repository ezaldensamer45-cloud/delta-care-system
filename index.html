<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>
<style>
body{
font-family:Arial;
background:#0f172a url("WhatsApp%20Image%202026-04-12%20at%205.54.37%20PM.jpeg");
background-size:cover;
color:white;
margin:0;
}
.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}
input,button{
padding:8px;
margin:5px;
}
.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
cursor:pointer;
}
.details{
display:none;
margin-top:10px;
}
</style>
</head>
<body>
<div class="overlay">
<h2>Delta Care System</h2>
<h3>Add Patient</h3>
<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">
<input id="disease" placeholder="Disease Type">
<input id="place" placeholder="Disease Location">
<input id="date" type="date">
<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials">
<input id="notes" placeholder="Notes">
<br>
<input type="file" id="images" multiple accept="image/*">
<br>
<button onclick="addPatient()">Add</button>
<hr>
<h3>Search</h3>
<input id="search" oninput="display()" placeholder="Search...">
<div id="list"></div>
</div>
<script>
let patients = JSON.parse(localStorage.getItem("patients")) || [];
function addPatient(){
let name = document.getElementById("name").value;
let age = document.getElementById("age").value;
let doctor = document.getElementById("doctor").value;
let disease = document.getElementById("disease").value;
let place = document.getElementById("place").value;
let date = document.getElementById("date").value;
let price = document.getElementById("price").value;
let materials = document.getElementById("materials").value;
let notes = document.getElementById("notes").value;
let files = document.getElementById("images").files;
let images = [];
if(files.length === 0){
savePatient(images,name,age,doctor,disease,place,date,price,materials,notes);
return;
}
for(let i=0;i<files.length;i++){
let reader = new FileReader();
reader.onload = function(e){
images.push(e.target.result);
if(images.length === files.length){
savePatient(images,name,age,doctor,disease,place,date,price,materials,notes);
}
};
reader.readAsDataURL(files[i]);
}
}
function savePatient(images,name,age,doctor,disease,place,date,price,materials,notes){
let patient = {
name:name,
age:age,
doctor:doctor,
disease:disease,
place:place,
date:date,
price:price,
materials:materials,
notes:notes,
images:images
};
patients.push(patient);
localStorage.setItem("patients", JSON.stringify(patients));
clearFields();
display();
}
function clearFields(){
document.querySelectorAll("input").forEach(i=>i.value="");
}
function deletePatient(i){
patients.splice(i,1);
localStorage.setItem("patients", JSON.stringify(patients));
display();
}
function toggleDetails(el){
let d = el.querySelector(".details");
d.style.display = d.style.display === "block" ? "none" : "block";
}
function display(){
let s = document.getElementById("search").value.toLowerCase();
let list = document.getElementById("list");
list.innerHTML = "";
patients
.filter(p => p.name.toLowerCase().includes(s))
.forEach((p,i)=>{
list.innerHTML += `
<div class="card" onclick="toggleDetails(this)">
<h3>${p.name}</h3>
<div class="details">
<p>Age: ${p.age}</p>
<p>Doctor: ${p.doctor}</p>
<p>Disease: ${p.disease}</p>
<p>Location: ${p.place}</p>
<p>Date: ${p.date}</p>
<p>Session: ${p.price} IQD</p>
<p>Materials: ${p.materials}</p>
<p>Notes: ${p.notes}</p>
${p.images.map(img=>`<img src="${img}" width="100">`).join("")}
<br><br>
<button onclick="event.stopPropagation(); deletePatient(${i})">Delete</button>
</div>
</div>
`;
});
}
display();
</script>
</body>
</html>
