<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care</title>

<style>
body{background:#0f172a;color:white;font-family:Arial;padding:20px}
input,button{margin:5px;padding:8px}
.card{background:#1e293b;padding:10px;margin:10px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="u" placeholder="user">
<input id="p" type="password" placeholder="pass">
<button onclick="log()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h2>Delta Care</h2>

<!-- 🔴 لوجو مضمون -->
<img src="https://via.placeholder.com/100" width="100">

<br><br>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">

<button onclick="add()">Add</button>

<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function log(){
if(u.value==="admin" && p.value==="1234"){
login.style.display="none";
app.style.display="block";
show();
}else{
alert("خطأ");
}
}

function add(){

if(name.value===""){
alert("اكتب اسم");
return;
}

data.push({
name:name.value,
age:age.value
});

localStorage.setItem("data",JSON.stringify(data));

show();

name.value="";
age.value="";
}

function show(){
list.innerHTML="";
data.forEach((x,i)=>{
list.innerHTML+=`
<div class="card">
${x.name} - ${x.age}
<button onclick="del(${i})">Delete</button>
</div>
`;
});
}

function del(i){
data.splice(i,1);
localStorage.setItem("data",JSON.stringify(data));
show();
}

</script>

</body>
</html>
