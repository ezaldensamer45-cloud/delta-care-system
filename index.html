<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.overlay{
background:rgba(0,0,0,0.7);
min-height:100vh;
padding:20px;
}

input{
padding:8px;
margin:5px;
width:180px;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="overlay">

<h2>Delta Care System</h2>

<h3>Add Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<input id="disease" placeholder="Disease Type">
<input id="place" placeholder="Disease Location">
<input id="notes" placeholder="Notes">

<input id="date" type="date">
<input id="price" placeholder="Session Price">

<br>

<button onclick="addPatient()">Add</button>

<hr>

<h3>Patients</h3>
<div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDUyPh2DVnkrDSFF_1YWptAplKJE8jdckc",
  authDomain: "delta-care-3cadc.firebaseapp.com",
  projectId: "delta-care-3cadc",
  storageBucket: "delta-care-3cadc.firebasestorage.app",
  messagingSenderId: "994601391598",
  appId: "1:994601391598:web:98fbca752208b8c2842aff"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ADD
function addPatient(){
let p = {
name: document.getElementById("name").value,
age: document.getElementById("age").value,
doctor: document.getElementById("doctor").value,
disease: document.getElementById("disease").value,
place: document.getElementById("place").value,
notes: document.getElementById("notes").value,
date: document.getElementById("date").value,
price: document.getElementById("price").value
};

db.collection("patients").add(p).then(()=>{
alert("Added ✅");
display();
});
}

// DISPLAY
function display(){
document.getElementById("list").innerHTML="";

db.collection("patients").get().then((data)=>{
data.forEach(doc=>{
let p = doc.data();

document.getElementById("list").innerHTML += `
<div class="card">
<p>Name: ${p.name}</p>
<p>Age: ${p.age}</p>
<p>Doctor: ${p.doctor}</p>
<p>Disease: ${p.disease}</p>
<p>Location: ${p.place}</p>
<p>Notes: ${p.notes}</p>
<p>Date: ${p.date}</p>
<p>Price: ${p.price}</p>

<button onclick="deletePatient('${doc.id}')">Delete</button>
</div>
`;
});
});
}

// DELETE
function deletePatient(id){
db.collection("patients").doc(id).delete().then(()=>{
display();
});
}

display();
</script>

</body>
</html>
