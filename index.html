<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

img{
width:70px;
margin:3px;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Delta Care System</h2>

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم المريض">
<input id="age" placeholder="العمر">
<input id="doctor" placeholder="الطبيب">
<input id="disease" placeholder="نوع المرض">
<input id="place" placeholder="مكان المرض">
<input id="date" type="date">
<input id="price" placeholder="سعر الجلسة">
<input id="materials" placeholder="المواد المستخدمة">
<input id="notes" placeholder="ملاحظات">

<br>
<input type="file" id="images" multiple>
<br>

<button onclick="addPatient()">➕ إضافة مريض</button>

<hr>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
authDomain: "delta-care-ff9e4.firebaseapp.com",
projectId: "delta-care-ff9e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 تحويل الصور
function toBase64(file){
return new Promise(resolve=>{
let reader = new FileReader();
reader.onload = ()=>resolve(reader.result);
reader.readAsDataURL(file);
});
}

// 🔥 إضافة مريض
window.addPatient = async function(){

let name = document.getElementById("name").value;
if(!name){ alert("اكتب الاسم"); return; }

let imgs = [];

for(let f of document.getElementById("images").files){
let b = await toBase64(f);
imgs.push(b);
}

await addDoc(collection(db,"patients"),{
name,
age: age.value,
doctor: doctor.value,
disease: disease.value,
place: place.value,
date: date.value,
price: price.value,
materials: materials.value,
notes: notes.value,
images: imgs,
sessions: []
});

alert("تم الحفظ ✅");
loadPatients();
}

// 🔥 عرض المرضى
async function loadPatients(){

let list = document.getElementById("list");
list.innerHTML = "";

let data = await getDocs(collection(db, "patients"));

data.forEach(d=>{

let p = d.data();
let id = d.id;

list.innerHTML += `
<div class="card">

<h3>${p.name}</h3>

<p>العمر: ${p.age}</p>
<p>الطبيب: ${p.doctor}</p>
<p>المرض: ${p.disease}</p>
<p>المكان: ${p.place}</p>
<p>التاريخ: ${p.date}</p>
<p>السعر: ${p.price}</p>
<p>المواد: ${p.materials}</p>
<p>ملاحظات: ${p.notes}</p>

${(p.images || []).map(img=>`
<img src="${img}" onclick="openImage('${img}')">
`).join("")}

<br>

<button onclick="editPatient('${id}')">✏ تعديل</button>
<button onclick="deletePatient('${id}')">🗑 حذف</button>
<button onclick="addSession('${id}')">➕ جلسة</button>
<button onclick="printPatient('${id}')">🖨 طباعة</button>

<div>
${(p.sessions || []).map(s=>`
<div>📅 ${s.date} - 💰 ${s.price}</div>
`).join("")}
</div>

</div>
`;
});
}

// 🔥 حذف
window.deletePatient = async function(id){
await deleteDoc(doc(db,"patients",id));
loadPatients();
}

// 🔥 تعديل
window.editPatient = async function(id){

let name = prompt("اسم");
let age = prompt("عمر");
let doctor = prompt("طبيب");
let disease = prompt("مرض");

await updateDoc(doc(db,"patients",id),{
name,age,doctor,disease
});

loadPatients();
}

// 🔥 جلسات
window.addSession = async function(id){

let date = prompt("تاريخ الجلسة");
let price = prompt("السعر");

let sessions = [];

let data = await getDocs(collection(db,"patients"));
let p;

data.forEach(d=>{ if(d.id===id) p=d.data(); });

sessions = p.sessions || [];

sessions.push({date,price});

await updateDoc(doc(db,"patients",id),{sessions});

loadPatients();
}

// 🔥 طباعة
window.printPatient = function(id){

let card = document.querySelectorAll(".card");
let content;

card.forEach(c=>{
if(c.innerHTML.includes(id)) content=c.innerHTML;
});

let w = window.open("");
w.document.write(content);
w.print();
}

// 🔥 تكبير الصورة
window.openImage = function(src){
let w = window.open("");
w.document.write(`<img src="${src}" style="width:100%">`);
}

loadPatients();

</script>

</body>
</html>
