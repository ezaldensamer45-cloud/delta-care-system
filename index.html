<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Care System</title>

<style>
body {
  font-family: Arial;
  background: url('https://raw.githubusercontent.com/ezaldensamer45-cloud/delta-care-system/main/WhatsApp%20Image%202026-04-12%20at%205.54.37%20PM.jpeg') no-repeat center center fixed;
  background-size: cover;
  color: white;
  padding: 20px;
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.85);
  z-index: -1;
}

.light {
  background: #f1f5f9;
  color: black;
}

input, select {
  padding: 8px;
  margin: 5px;
}

button {
  padding: 8px 15px;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}
</style>

</head>

<body>

<h2>Delta Care System</h2>

<button onclick="toggleMode()">🌙 / ☀️</button>

<h3>Add Patient</h3>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="doctor" placeholder="Doctor">

<select id="type">
  <option>Complex wounds</option>
  <option>Burns</option>
  <option>Diabetic foot</option>
</select>

<select id="place">
  <option>Hand</option>
  <option>Foot</option>
  <option>Back</option>
</select>

<input id="sessionDate" type="date">
<input id="price" placeholder="Session Price">
<input id="materials" placeholder="Materials">
<input id="mprice" placeholder="Materials Price">

<button onclick="addPatient()">Add</button>

<hr>

<h3>Search</h3>
<input id="search" placeholder="Search..." oninput="display()">

<div id="list"></div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")) || [];

function save(){
  localStorage.setItem("patients", JSON.stringify(patients));
}

function addPatient(){
  let p = {
    name: document.getElementById("name").value,
    age: document.getElementById("age").value,
    doctor: document.getElementById("doctor").value,
    type: document.getElementById("type").value,
    place: document.getElementById("place").value,
    date: document.getElementById("sessionDate").value,
    price: document.getElementById("price").value,
    materials: document.getElementById("materials").value,
    mprice: document.getElementById("mprice").value
  };

  patients.push(p);
  save();
  display();
}

function deletePatient(i){
  patients.splice(i,1);
  save();
  display();
}

function display(){
  let s = document.getElementById("search").value.toLowerCase();
  let list = document.getElementById("list");
  list.innerHTML = "";

  patients
  .filter(p => p.name.toLowerCase().includes(s))
  .forEach((p,i)=>{

    list.innerHTML += `
    <div class="card">
      <h3>${p.name}</h3>
      <p>Age: ${p.age}</p>
      <p>Doctor: ${p.doctor}</p>
      <p>Type: ${p.type}</p>
      <p>Place: ${p.place}</p>
      <p>Date: ${p.date}</p>
      <p>Session: ${p.price} IQD</p>
      <p>Materials: ${p.materials}</p>
      <p>Materials Cost: ${p.mprice} IQD</p>
      <button onclick="deletePatient(${i})">Delete</button>
    </div>
    `;
  });
}

function toggleMode(){
  document.body.classList.toggle("light");
}

display();

</script>

</body>
</html>
