<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.details{display:none;}

.title{
cursor:pointer;
display:flex;
justify-content:space-between;
}

img{
width:70px;
margin:3px;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Delta Care System</h2>

<!-- LOGIN -->
<div id="loginBox">
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">

<button onclick="changeLogin()">⚙️ تغيير اليوزر والباس</button>

<input id="search" oninput="loadPatients()" placeholder="بحث">

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم المريض">
<input id="age" placeholder="العمر">
<input id="doctor" placeholder="الطبيب">
<input id="disease" placeholder="نوع المرض">
<input id="place" placeholder="مكان المرض">
<input id="date" type="date">
<input id="price" placeholder="سعر الجلسة">
<input id="materials" placeholder="المواد المستخدمة">
<input id="notes" placeholder="ملاحظات">

<br>
<input type="file" id="images" multiple>
<br>

<button onclick="addPatient()">➕ إضافة مريض</button>

<hr>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
authDomain:"delta-care-ff9e4.firebaseapp.com",
projectId:"delta-care-ff9e4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// أول مرة
if(!localStorage.getItem("user")){
localStorage.setItem("user","admin");
localStorage.setItem("pass","1234");
}

// تسجيل دخول
window.login = function(){

if(user.value === localStorage.getItem("user") && pass.value === localStorage.getItem("pass")){
localStorage.setItem("logged","yes");
loginBox.style.display="none";
document.getElementById("app").style.display="block";
loadPatients();
}else{
alert("خطأ");
}
}

// تغيير اليوزر والباس
window.changeLogin = function(){

let u = prompt("يوزر جديد");
let p = prompt("باس جديد");

if(u && p){
localStorage.setItem("user",u);
localStorage.setItem("pass",p);
alert("تم التغيير");
}
}

// حفظ الدخول
if(localStorage.getItem("logged")==="yes"){
loginBox.style.display="none";
document.getElementById("app").style.display="block";
loadPatients();
}

// تحويل صورة
function toBase64(file){
return new Promise(resolve=>{
let r=new FileReader();
r.onload=()=>resolve(r.result);
r.readAsDataURL(file);
});
}

// إضافة
window.addPatient = async function(){

let name = document.getElementById("name").value;
if(!name){ alert("اكتب الاسم"); return; }

let imgs=[];

for(let f of images.files){
let b=await toBase64(f);
imgs.push(b);
}

await addDoc(collection(db,"patients"),{
name,
age:age.value,
doctor:doctor.value,
disease:disease.value,
place:place.value,
date:date.value,
price:price.value,
materials:materials.value,
notes:notes.value,
images:imgs,
sessions:[]
});

loadPatients();
}

// عرض
async function loadPatients(){

list.innerHTML="";
let s=search.value.toLowerCase();

let data = await getDocs(collection(db,"patients"));

data.forEach(d=>{

let p = d.data();
let id = d.id;

if(!p.name.toLowerCase().includes(s)) return;

list.innerHTML += `
<div class="card">

<div class="title" onclick="toggle('${id}')">
<span>${p.name}</span>
<span id="a${id}">⬇</span>
</div>

<div class="details" id="${id}">

<p>العمر: ${p.age}</p>
<p>الطبيب: ${p.doctor}</p>
<p>المرض: ${p.disease}</p>

${(p.images||[]).map(img=>`
<img src="${img}">
`).join("")}

<br>

<button onclick="deletePatient('${id}')">🗑 حذف</button>
<button onclick="editPatient('${id}')">✏ تعديل</button>
<button onclick="addSession('${id}')">➕ جلسة</button>
<button onclick="printPatient('${id}')">🖨 طباعة</button>

<div>
${(p.sessions||[]).map(s=>`
<div>📅 ${s.date} - 💰 ${s.price}</div>
`).join("")}
</div>

</div>

</div>
`;
});
}

// فتح وغلق
window.toggle = function(id){
let d=document.getElementById(id);
let a=document.getElementById("a"+id);

d.style.display=d.style.display==="block"?"none":"block";
a.innerText=d.style.display==="block"?"⬆":"⬇";
}

// حذف
window.deletePatient = async function(id){
await deleteDoc(doc(db,"patients",id));
loadPatients();
}

// تعديل
window.editPatient = async function(id){
let name = prompt("اسم جديد");
await updateDoc(doc(db,"patients",id),{name});
loadPatients();
}

// جلسة
window.addSession = async function(id){
let date = prompt("تاريخ");
let price = prompt("سعر");

let data = await getDocs(collection(db,"patients"));
let p;

data.forEach(d=>{ if(d.id===id) p=d.data(); });

let sessions = p.sessions || [];
sessions.push({date,price});

await updateDoc(doc(db,"patients",id),{sessions});

loadPatients();
}

// طباعة
window.printPatient = function(id){

let cards = document.querySelectorAll(".card");
let content = "";

cards.forEach(c=>{
if(c.innerHTML.includes(id)){
content = c.innerHTML;
}
});

let w = window.open("");
w.document.write(content);
w.print();
}

</script>

</body>
</html>
