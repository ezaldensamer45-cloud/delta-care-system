<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care System</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

img{
width:70px;
margin:3px;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Delta Care System</h2>

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم المريض">
<input id="age" placeholder="العمر">
<input id="doctor" placeholder="الطبيب">
<input id="disease" placeholder="نوع المرض">
<input id="place" placeholder="مكان المرض">
<input id="date" type="date">
<input id="price" placeholder="سعر الجلسة">
<input id="materials" placeholder="المواد المستخدمة">
<input id="notes" placeholder="ملاحظات">

<br>
<input type="file" id="images" multiple>
<br>

<button onclick="addPatient()">➕ إضافة مريض</button>

<hr>

<div id="list"></div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
  authDomain: "delta-care-ff9e4.firebaseapp.com",
  projectId: "delta-care-ff9e4",
  storageBucket: "delta-care-ff9e4.firebasestorage.app",
  messagingSenderId: "941195755372",
  appId: "1:941195755372:web:02c1470c4362765c513d49"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 إضافة مريض
window.addPatient = function(){

let name = document.getElementById("name").value;

if(!name){
alert("اكتب الاسم");
return;
}

let files = document.getElementById("images").files;

let images = [];

if(files.length > 0){

let count = 0;

for(let i=0;i<files.length;i++){

let reader = new FileReader();

reader.onload = function(e){

images.push(e.target.result);
count++;

if(count === files.length){
save(images);
}

};

reader.readAsDataURL(files[i]);
}

}else{
save([]);
}

async function save(images){

await addDoc(collection(db, "patients"), {
name: name,
age: document.getElementById("age").value,
doctor: document.getElementById("doctor").value,
disease: document.getElementById("disease").value,
place: document.getElementById("place").value,
date: document.getElementById("date").value,
price: document.getElementById("price").value,
materials: document.getElementById("materials").value,
notes: document.getElementById("notes").value,
images: images
});

alert("تم الحفظ ✅");

loadPatients();
}

}

// 🔥 عرض المرضى
async function loadPatients(){

let list = document.getElementById("list");
list.innerHTML = "";

let data = await getDocs(collection(db, "patients"));

data.forEach(doc=>{

let p = doc.data();

list.innerHTML += `
<div class="card">
<h3>${p.name}</h3>
<p>العمر: ${p.age}</p>
<p>الطبيب: ${p.doctor}</p>
<p>المرض: ${p.disease}</p>
<p>المكان: ${p.place}</p>
<p>التاريخ: ${p.date}</p>
<p>السعر: ${p.price}</p>
<p>المواد: ${p.materials}</p>
<p>ملاحظات: ${p.notes}</p>

${(p.images || []).map(img=>`
<img src="${img}" onclick="openImage('${img}')">
`).join("")}

</div>
`;

});

}

// 🔥 تكبير الصورة
window.openImage = function(src){
let w = window.open("");
w.document.write(`<img src="${src}" style="width:100%">`);
}

// تشغيل أولي
loadPatients();

</script>

</body>
</html>
