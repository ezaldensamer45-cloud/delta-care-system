<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Delta Care Pro</title>

<style>
body{
font-family:Arial;
background:url("file_00000000facc7246b6da64fac183c4f1.jpg") no-repeat center;
background-size:cover;
color:white;
padding:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:black;
color:white;
cursor:pointer;
font-weight:bold;
}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:8px;
}

.details{display:none}

img{
width:70px;
margin:3px;
border-radius:5px;
cursor:pointer;
}

.title{
display:flex;
justify-content:space-between;
font-size:20px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Delta Care Pro</h2>

<div id="loginBox">
<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="pass">
<button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">

<input id="search" placeholder="بحث" oninput="loadPatients()">

<h3>إضافة مريض</h3>

<input id="name" placeholder="اسم">
<input id="age" placeholder="عمر">
<input id="doctor" placeholder="طبيب">
<input id="disease" placeholder="مرض">
<input id="place" placeholder="مكان">
<input id="date" type="date">
<input id="price" placeholder="سعر">
<input id="materials" placeholder="مواد">
<input id="notes" placeholder="ملاحظات">

<input type="file" id="images" multiple>

<button onclick="addPatient()">➕ إضافة</button>

<hr>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyCh9CvocS2Ml7Pwowde8SFLwI0dbITLt5E",
authDomain:"delta-care-ff9e4.firebaseapp.com",
projectId:"delta-care-ff9e4"
});

const db = getFirestore(app);

// إنشاء يوزر افتراضي
if(!localStorage.getItem("user")){
localStorage.setItem("user","admin");
localStorage.setItem("pass","1234");
}

// تسجيل الدخول
window.login = function(){

let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === localStorage.getItem("user") && p === localStorage.getItem("pass")){
localStorage.setItem("logged","yes");

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

loadPatients();

}else{
alert("خطأ");
}
}

// حفظ الدخول
if(localStorage.getItem("logged")==="yes"){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
loadPatients();
}

// تحويل الصور
function toBase64(file){
return new Promise(resolve=>{
let reader=new FileReader();
reader.onload=()=>resolve(reader.result);
reader.readAsDataURL(file);
});
}

// إضافة مريض
window.addPatient = async function(){

let name = document.getElementById("name").value;
if(!name){ alert("اكتب الاسم"); return; }

let imgs=[];
let files = document.getElementById("images").files;

for(let f of files){
let b = await toBase64(f);
imgs.push(b);
}

await addDoc(collection(db,"patients"),{
name,
age:document.getElementById("age").value,
doctor:document.getElementById("doctor").value,
disease:document.getElementById("disease").value,
place:document.getElementById("place").value,
date:document.getElementById("date").value,
price:document.getElementById("price").value,
materials:document.getElementById("materials").value,
notes:document.getElementById("notes").value,
images:imgs,
sessions:[]
});

alert("تمت الإضافة ✅");

loadPatients();
}

// عرض المرضى
window.loadPatients = async function(){

let list = document.getElementById("list");
list.innerHTML="";

let search = document.getElementById("search").value.toLowerCase();

let data = await getDocs(collection(db,"patients"));

data.forEach(d=>{

let p = d.data();
let id = d.id;

if(!p.name.toLowerCase().includes(search)) return;

list.innerHTML += `
<div class="card">

<div class="title" onclick="toggle('${id}')">
<span>${p.name}</span>
<span id="a${id}">⬇</span>
</div>

<div class="details" id="${id}">

<p>العمر: ${p.age}</p>
<p>الطبيب: ${p.doctor}</p>
<p>المرض: ${p.disease}</p>
<p>المكان: ${p.place}</p>

${(p.images||[]).map((img,i)=>`
<div>
<img src="${img}" onclick="openImage('${img}')">
<button onclick="deleteImage('${id}',${i})">❌</button>
</div>
`).join("")}

<button onclick="addSession('${id}')">➕ جلسة</button>
<button onclick="editPatient('${id}')">✏ تعديل</button>
<button onclick="deletePatient('${id}')">🗑 حذف</button>

<div>
${(p.sessions||[]).map(s=>`
<div>📅 ${s.date} - 💰 ${s.price}</div>
`).join("")}
</div>

</div>
</div>
`;
});
}

// فتح وغلق
window.toggle = function(id){
let d=document.getElementById(id);
let a=document.getElementById("a"+id);

d.style.display = d.style.display==="block" ? "none" : "block";
a.innerText = d.style.display==="block" ? "⬆" : "⬇";
}

// حذف مريض
window.deletePatient = async function(id){
await deleteDoc(doc(db,"patients",id));
loadPatients();
}

// حذف صورة
window.deleteImage = async function(id,index){

let data = await getDocs(collection(db,"patients"));
let p;

data.forEach(d=>{ if(d.id===id) p=d.data(); });

p.images.splice(index,1);

await updateDoc(doc(db,"patients",id),{images:p.images});

loadPatients();
}

// تعديل
window.editPatient = async function(id){

let name = prompt("اسم جديد");
let age = prompt("عمر جديد");

await updateDoc(doc(db,"patients",id),{name,age});

loadPatients();
}

// جلسة
window.addSession = async function(id){

let date = prompt("تاريخ");
let price = prompt("سعر");

let input = document.createElement("input");
input.type="file";
input.multiple=true;

input.onchange = async ()=>{

let imgs=[];

for(let f of input.files){
let b = await toBase64(f);
imgs.push(b);
}

let data = await getDocs(collection(db,"patients"));
let p;

data.forEach(d=>{ if(d.id===id) p=d.data(); });

let sessions = p.sessions || [];

sessions.push({date,price,images:imgs});

await updateDoc(doc(db,"patients",id),{sessions});

loadPatients();
}

input.click();
}

// عرض صورة
window.openImage = function(src){
let w = window.open("");
w.document.write(`<img src="${src}" style="width:100%">`);
}

</script>

</body>
</html>
